<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario - Corregido</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            background-color: #5c94fc; /* Azul cielo */
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="448"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Configuración física
        const gravity = 0.6;
        const friction = 0.85;

        // Estado del Jugador
        const player = {
            x: 100,
            y: 200,
            width: 32,
            height: 48,
            velX: 0,
            velY: 0,
            speed: 5,
            jumpForce: 12,
            grounded: false,
            coins: 0,
            powerUp: false
        };

        const camera = { x: 0, width: canvas.width };

        // Arrays globales de entidades
        let platforms = [];
        let coins = [];
        let enemies = [];
        let powerUps = [];

        // --- GENERACIÓN DEL MAPA ---
        function initLevel() {
            platforms = [];
            coins = [];
            enemies = [];
            powerUps = [];
            
            player.x = 100;
            player.y = 200;
            player.velX = 0;
            player.velY = 0;
            player.powerUp = false;

            // 1. Suelo base con abismos
            for (let i = 0; i < 120; i++) {
                if ((i < 15 || i > 17) && (i < 45 || i > 48) && (i < 80 || i > 83)) {
                    platforms.push({ x: i * 32, y: canvas.height - 64, width: 32, height: 64, type: 'ground' });
                }
            }

            // 2. Tuberías Verdes
            platforms.push({ x: 450, y: canvas.height - 64 - 64, width: 64, height: 64, type: 'pipe' });
            platforms.push({ x: 900, y: canvas.height - 64 - 96, width: 64, height: 96, type: 'pipe' });
            platforms.push({ x: 1600, y: canvas.height - 64 - 128, width: 64, height: 128, type: 'pipe' });

            // 3. Bloques Flotantes y Cajas Sorpresa
            const blocks = [
                { x: 280, y: 260, type: 'brick' },
                { x: 312, y: 260, type: 'box', item: 'mushroom' }, // CAJA DEL HONGO
                { x: 344, y: 260, type: 'brick' },
                
                { x: 700, y: 240, type: 'brick' },
                { x: 732, y: 240, type: 'box', item: 'coin' },
                { x: 764, y: 240, type: 'brick' },

                { x: 1200, y: 320, type: 'brick' },
                { x: 1232, y: 288, type: 'box', item: 'coin' },
                { x: 1264, y: 320, type: 'brick' }
            ];
            blocks.forEach(b => {
                platforms.push({ x: b.x, y: b.y, width: 32, height: 32, type: b.type, item: b.item, hit: false });
            });

            // 4. Monedas flotantes
            const coinPositions = [
                { x: 288, y: 210 }, { x: 352, y: 210 },
                { x: 600, y: 320 }, { x: 650, y: 320 },
                { x: 1050, y: 250 }, { x: 1100, y: 250 }
            ];
            coinPositions.forEach(c => coins.push({ x: c.x, y: c.y, width: 16, height: 20, collected: false }));

            // 5. Enemigos (Goombas) obligatorios en pantalla
            enemies.push({ x: 580, y: 300, width: 32, height: 32, velX: -1.5, type: 'goomba' });
            enemies.push({ x: 1050, y: 300, width: 32, height: 32, velX: -2.0, type: 'goomba' });
            enemies.push({ x: 1400, y: 300, width: 32, height: 32, velX: -1.5, type: 'goomba' });
        }

        // Sistema de colisiones por los 4 lados (AABB)
        function colCheck(shapeA, shapeB) {
            let vX = (shapeA.x + (shapeA.width / 2)) - (shapeB.x + (shapeB.width / 2)),
                vY = (shapeA.y + (shapeA.height / 2)) - (shapeB.y + (shapeB.height / 2)),
                hWidths = (shapeA.width / 2) + (shapeB.width / 2),
                hHeights = (shapeA.height / 2) + (shapeB.height / 2),
                colDir = null;

            if (Math.abs(vX) < hWidths && Math.abs(vY) < hHeights) {
                let oX = hWidths - Math.abs(vX),
                    oY = hHeights - Math.abs(vY);
                if (oX >= oY) {
                    if (vY > 0) { colDir = "t"; shapeA.y += oY; } 
                    else { colDir = "b"; shapeA.y -= oY; }
                } else {
                    if (vX > 0) { colDir = "l"; shapeA.x += oX; } 
                    else { colDir = "r"; shapeA.x -= oX; }
                }
            }
            return colDir;
        }

        const keys = [];
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function update() {
            // Controles básicos
            if (keys['ArrowRight'] || keys['KeyD']) { if (player.velX < player.speed) player.velX++; }
            if (keys['ArrowLeft'] || keys['KeyA']) { if (player.velX > -player.speed) player.velX--; }
            if (keys['ArrowUp'] || keys['Space'] || keys['KeyW']) {
                if (player.grounded) { player.velY = -player.jumpForce; player.grounded = false; }
            }

            player.velX *= friction;
            player.velY += gravity;
            player.grounded = false;

            // Colisiones estructurales
            platforms.forEach(platform => {
                let dir = colCheck(player, platform);
                if (dir === "l" || dir === "r") {
                    player.velX = 0;
                } else if (dir === "b") {
                    player.grounded = true;
                    player.velY = 0;
                } else if (dir === "t") {
                    player.velY = 2;
                    // Activar bloque sorpresa al golpearlo por abajo
                    if (platform.type === 'box' && !platform.hit) {
                        platform.hit = true;
                        if (platform.item === 'mushroom') {
                            powerUps.push({ x: platform.x, y: platform.y - 32, width: 32, height: 32, velX: 1.5, velY: 0, type: 'mushroom' });
                        } else if (platform.item === 'coin') {
                            player.coins++;
                        }
                    }
                }
            });

            // Actualizar Hongo (Power-Up)
            powerUps.forEach(p => {
                p.velY += gravity;
                p.x += p.velX;
                p.y += p.velY;

                platforms.forEach(plat => {
                    let d = colCheck(p, plat);
                    if (d === "b") p.velY = 0;
                    if (d === "l" || d === "r") p.velX *= -1;
                });

                // Mario toca el Hongo
                if (player.x < p.x + p.width && player.x + player.width > p.x &&
                    player.y < p.y + p.height && player.y + player.height > p.y) {
                        player.powerUp = true; // Activa modo Super Mario
                        p.y = -9999; // Lo saca del mapa
                }
            });

            // Actualizar Goombas (Enemigos)
            enemies.forEach((enemy, index) => {
                enemy.velY += gravity;
                enemy.x += enemy.velX;
                enemy.y += enemy.velY;

                platforms.forEach(plat => {
                    let d = colCheck(enemy, plat);
                    if (d === "b") enemy.velY = 0;
                    if (d === "l" || d === "r") enemy.velX *= -1; // Rebotar contra tubos/muros
                });

                // Interacción Mario vs Goomba
                if (player.x < enemy.x + enemy.width && player.x + player.width > enemy.x &&
                    player.y < enemy.y + enemy.height && player.y + player.height > enemy.y) {
                    
                    if (player.velY > 0 && player.y + player.height - player.velY <= enemy.y + 14) {
                        player.velY = -8; // Rebote elástico
                        enemies.splice(index, 1); // Goomba eliminado
                    } else {
                        if (player.powerUp) {
                            player.powerUp = false; // Pierde powerup pero vive
                            enemy.velX *= -1;
                            player.x += (player.x < enemy.x) ? -40 : 40;
                        } else {
                            initLevel(); // Muere y reinicia todo el mapa
                        }
                    }
                }
            });

            // Monedas
            coins.forEach(coin => {
                if (!coin.collected && player.x < coin.x + coin.width && player.x + player.width > coin.x &&
                    player.y < coin.y + coin.height && player.y + player.height > coin.y) {
                        coin.collected = true;
                        player.coins++;
                }
            });

            player.x += player.velX;
            player.y += player.velY;
            if (player.x < 0) player.x = 0;

            // Movimiento de cámara
            if (player.x > canvas.width / 2) { camera.x = player.x - canvas.width / 2; } 
            else { camera.x = 0; }

            // Caída al abismo
            if (player.y > canvas.height) { initLevel(); }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(-camera.x, 0);

            // Dibujar Plataformas
            platforms.forEach(p => {
                if (p.type === 'ground') {
                    ctx.fillStyle = '#d88444'; ctx.fillRect(p.x, p.y, p.width, p.height);
                    ctx.fillStyle = '#4cb050'; ctx.fillRect(p.x, p.y, p.width, 10);
                } else if (p.type === 'pipe') {
                    ctx.fillStyle = '#00a800'; ctx.fillRect(p.x, p.y, p.width, p.height);
                    ctx.fillStyle = '#005800'; ctx.strokeRect(p.x, p.y, p.width, p.height);
                } else if (p.type === 'brick') {
                    ctx.fillStyle = '#b84418'; ctx.fillRect(p.x, p.y, p.width, p.height);
                    ctx.strokeStyle = '#fca044'; ctx.strokeRect(p.x, p.y, p.width, p.height);
                } else if (p.type === 'box') {
                    ctx.fillStyle = p.hit ? '#8a5230' : '#fc9c5c'; ctx.fillRect(p.x, p.y, p.width, p.height);
                    ctx.fillStyle = '#fff'; ctx.font = 'bold 16px Arial'; ctx.fillText(p.hit ? '.' : '?', p.x + 12, p.y + 22);
                    ctx.strokeStyle = '#000'; ctx.strokeRect(p.x, p.y, p.width, p.height);
                }
            });

            // Dibujar Monedas
            coins.forEach(c => {
                if (!c.collected) {
                    ctx.fillStyle = '#fcc018'; ctx.beginPath(); ctx.ellipse(c.x + 8, c.y + 10, 6, 10, 0, 0, Math.PI * 2); ctx.fill();
                }
            });

            // Dibujar Champiñón (Aparece solo si golpeas el bloque "?" central)
            powerUps.forEach(p => {
                ctx.fillStyle = '#ff3800'; ctx.beginPath(); ctx.arc(p.x + 16, p.y + 14, 14, Math.PI, 0, false); ctx.fill();
                ctx.fillStyle = '#f8b888'; ctx.fillRect(p.x + 8, p.y + 14, 16, 18);
            });

            // Dibujar Goombas
            enemies.forEach(e => {
                ctx.fillStyle = '#a84400'; ctx.beginPath(); ctx.arc(e.x + 16, e.y + 16, 16, Math.PI, 0, false); ctx.fill();
                ctx.fillRect(e.x + 4, e.y + 14, 24, 18);
                ctx.fillStyle = '#000'; ctx.fillRect(e.x + 2, e.y + 26, 10, 6); ctx.fillRect(e.x + 20, e.y + 26, 10, 6);
            });

            // Dibujar Mario (Cambia visualmente si consigues el Hongo)
            let overolColor = player.powerUp ? '#ffffff' : '#0020f8'; // Overol Blanco si tiene PowerUp
            ctx.fillStyle = overolColor; ctx.fillRect(player.x + 4, player.y + 24, player.width - 8, 24);
            ctx.fillStyle = '#f83800'; ctx.fillRect(player.x + 2, player.y + 8, player.width - 4, 16); // Camisa
            ctx.fillStyle = '#f8b888'; ctx.fillRect(player.x + 6, player.y, player.width - 12, 12); // Piel
            ctx.fillStyle = '#f83800'; ctx.fillRect(player.x + 4, player.y, player.width - 8, 4); // Gorra

            ctx.restore();

            // Marcador HUD superior
            ctx.fillStyle = '#fff'; ctx.font = 'bold 18px "Courier New"';
            ctx.fillText(`MARIO   MONEDAS: ${player.coins.toString().padStart(2, '0')}   POWERUP: ${player.powerUp ? "SÚPER" : "NINGUNO"}`, 30, 40);
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

        // Inicialización Forzada e Inmediata
        initLevel();
        gameLoop();
    </script>
</body>
</html>
